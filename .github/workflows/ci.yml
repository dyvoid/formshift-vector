name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          # The quality gate never launches Electron; skip the ~100MB binary download.
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
